name: CI

# Workflows are gated below so they don't burn billing while the repo
# is private. They auto-enable when the repo flips public at v1.0.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel any in-flight CI run for the same ref when a new push lands.
# Saves minutes on rapid pushes and avoids the "second push lands first"
# race that shows a stale red check on the latest commit.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: ${{ github.event.repository.private == false || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run size
