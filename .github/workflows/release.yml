name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Releases are per-tag, but two pushes to the same tag should not run
# in parallel and clobber each other's uploaded assets.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: ${{ github.event.repository.private == false || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      # Enforce the same gates CI runs so a release tag can't ship
      # a broken or oversized embed bundle.
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run size
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/embed.js
            dist/embed.js.map
