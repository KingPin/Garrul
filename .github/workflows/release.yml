name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Releases are per-tag, but two pushes to the same tag should not run
# in parallel and clobber each other's uploaded assets.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: ${{ github.event.repository.private == false || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      # wrangler.toml is gitignored (it holds real binding IDs). The dry-run
      # build below doesn't talk to the API, but wrangler 4 still requires a
      # config file or it falls back to framework auto-detection and errors.
      # The example file's placeholder IDs are accepted by --dry-run.
      - run: cp wrangler.example.toml wrangler.toml
      # Enforce the same gates CI runs so a release tag can't ship
      # a broken or oversized embed bundle.
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      # Gate: refuse to cut a tagged release if release-manifest.json
      # doesn't match the source tree — operators rely on it for upgrades.
      - run: npm run manifest:check
      - run: npm run build
      - run: npm run size
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          # release-manifest.json is the upgrade contract for self-hosters.
          # The orchestrator primarily fetches it from raw.githubusercontent
          # (no auth), but attaching it to the release gives a fallback URL.
          files: |
            dist/embed.js
            dist/embed.js.map
            release-manifest.json
