# Copy this file to wrangler.toml and fill in the IDs.
# wrangler.toml is gitignored (it holds your real binding IDs).
# Secrets are NOT in this file — set them with:
#   wrangler secret put <NAME>
# For local dev, put secrets in .dev.vars (gitignored). See .dev.vars.example.

name = "garrul"
main = "src/index.ts"
compatibility_date = "2025-11-01"
compatibility_flags = ["nodejs_compat"]

# Recommended: point at your custom subdomain (e.g. comments.example.com).
# Falling back to <name>.workers.dev works but causes third-party-cookie
# friction in some browsers — see docs.
# routes = [
#   { pattern = "comments.example.com", custom_domain = true }
# ]

# Used for build-time embed.js inlining of the API base URL.
[vars]
ENV = "production"
EDIT_WINDOW_MINUTES = "15"
ALLOWED_ORIGINS = "https://yourblog.example.com"
ADMIN_EMAILS = "you@example.com"
EMAIL_PROVIDER = "resend"
# From address for digest emails. Must be on a domain verified in Resend.
EMAIL_FROM = "Garrul <comments@example.com>"
# Public base URL of this worker, used for /c/:id permalinks inside digest emails
# and for unsubscribe links. Same value as OAUTH_CALLBACK_BASE in most setups.
PUBLIC_BASE_URL = "https://comments.example.com"
# Optional. The public URL of this instance (e.g. "https://comments.example.com").
# Only set this if the Worker sits behind a proxy or custom domain where the
# inbound `Host` header doesn't match your canonical address. Used by the
# /AGENTS.md route to produce ready-to-paste embed snippets for AI assistants.
# CANONICAL_URL = "https://comments.example.com"
# OAuth callback base — must match the redirect URI you registered with
# each provider (e.g. https://comments.example.com/api/v1/auth/github/callback).
# Leave unset in dev; the worker falls back to the request origin.
OAUTH_CALLBACK_BASE = "https://comments.example.com"
# Feature flags. These are env-var DEFAULTS — an operator can override any of
# them at runtime from the admin Settings page (a DB row wins over the env
# var). Set "0"/"false" to disable. Comment-level features default ON; the
# page-level features default OFF so an upgrade doesn't surface new UI on an
# instance that didn't opt in.
#
# Comment voting (downvotes are implicitly off when voting itself is off):
# VOTING_ENABLED = "true"
# DOWNVOTES_ENABLED = "true"
# Accepting new comments:
# COMMENTS_ENABLED = "true"
# Per-comment emoji reactions:
# REACTIONS_ENABLED = "true"
# Page-level engagement — react / vote on the article itself (default off):
# PAGE_REACTIONS_ENABLED = "false"
# PAGE_VOTES_ENABLED = "false"
# Optional: Cloudflare account ID — paired with the CF_API_TOKEN secret to
# enable the /admin/usage analytics page.
# CF_ACCOUNT_ID = "0123abcd..."

# Anti-spam (all optional; OFF by default). See docs/ANTISPAM.md.
# Pluggable content classifier — "akismet" or "workers-ai". Leave unset for none.
# SPAM_PROVIDER = "akismet"
# SPAM_PROVIDER = "workers-ai"
#
# Lightweight in-core heuristics. Unset = off. Tripped signals flag the
# comment to status='pending' (admin queue) — never a silent drop.
# SPAM_LINK_THRESHOLD = "3"            # flag if > N URLs in body
# SPAM_HONEYPOT_MIN_MS = "1500"        # flag if form submitted faster than N ms
# SPAM_FIRST_COMMENT_MODERATE = "true" # first comment from a new author → pending
#
# For SPAM_PROVIDER = "workers-ai", also add this binding:
# [ai]
# binding = "AI"

# Notification digest job runs every 15 minutes; tune to taste.
# Comments newer than 5 minutes are debounced so a reply burst coalesces
# into a single email per subscriber.
[triggers]
crons = ["*/15 * * * *"]

# Secrets (set via `wrangler secret put`, NOT in this file):
#   wrangler secret put JWT_SECRET            # cookie signing for anon edit tokens
#   wrangler secret put IP_HASH_SECRET        # BLAKE3 IP hashing pepper
#   wrangler secret put TURNSTILE_SITE_KEY
#   wrangler secret put TURNSTILE_SECRET
#   wrangler secret put GH_CLIENT_ID
#   wrangler secret put GH_CLIENT_SECRET
#   wrangler secret put GOOGLE_CLIENT_ID
#   wrangler secret put GOOGLE_CLIENT_SECRET
#   wrangler secret put RESEND_API_KEY
#   wrangler secret put WEBHOOK_URL           # legacy single-URL webhook; prefer /admin/webhooks endpoints
#   wrangler secret put CF_API_TOKEN          # optional, Analytics-read token for /admin/usage (with CF_ACCOUNT_ID var)
#   wrangler secret put SPAM_FORM_TS_SECRET   # HMAC key for signed form-timestamp tokens (set when SPAM_HONEYPOT_MIN_MS is used)
#   wrangler secret put AKISMET_API_KEY       # required when SPAM_PROVIDER = "akismet"
#   wrangler secret put AKISMET_SITE_URL      # public site URL for Akismet (e.g. https://yourblog.example.com)

[[d1_databases]]
binding = "DB"
database_name = "garrul-db"
database_id = "PASTE_FROM_WRANGLER_D1_CREATE"

[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "PASTE_FROM_WRANGLER_KV_CREATE"

[[kv_namespaces]]
binding = "OAUTH_STATE"
id = "PASTE_FROM_WRANGLER_KV_CREATE"

[[kv_namespaces]]
binding = "SESSIONS"
id = "PASTE_FROM_WRANGLER_KV_CREATE"

[[kv_namespaces]]
binding = "TREE_CACHE"
id = "PASTE_FROM_WRANGLER_KV_CREATE"

# Workers Analytics Engine — write-side metrics (comment-posted, rate-limit-hit, etc.).
# Free tier covers small operators easily.
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "garrul_events"
